<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WAVC - Club Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden justify-center items-center">
<main class="w-full max-w-md mx-auto px-4 py-8 flex flex-col gap-6">
<div class="flex flex-col gap-2 mb-4">
<div class="flex items-center gap-3 text-slate-900 dark:text-white mb-2">
<div class="size-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<h2 class="text-xl font-bold leading-tight tracking-[-0.015em]">WAVC</h2>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Club Setup</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Create your club profile to start managing events.</p>
</div>
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 dark:text-white">Club Logo</label>
<div class="flex items-center gap-4">
<div class="relative size-24 rounded-full bg-slate-100 dark:bg-[#1c2936] border-2 border-dashed border-slate-300 dark:border-slate-600 flex items-center justify-center overflow-hidden group hover:border-primary transition-colors cursor-pointer">
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10" type="file"/>
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-3xl group-hover:text-primary transition-colors">add_photo_alternate</span>
</div>
<div class="flex flex-col gap-1">
<p class="text-sm font-medium text-slate-900 dark:text-white">Upload Image</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Min 400x400px, PNG or JPG</p>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 dark:text-white" for="club-name">Club Name</label>
<input class="w-full rounded-xl border-slate-200 dark:border-[#233648] bg-white dark:bg-[#111a22] px-4 py-3 text-sm font-medium text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="club-name" placeholder="e.g. Robotics Society" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-900 dark:text-white" for="instagram-id">Instagram Handle</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">@</span>
<input class="w-full rounded-xl border-slate-200 dark:border-[#233648] bg-white dark:bg-[#111a22] pl-8 pr-4 py-3 text-sm font-medium text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="instagram-id" placeholder="club_official" type="text"/>
</div>
</div>
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-slate-900 dark:text-white">Category</label>
<div class="grid grid-cols-2 gap-3">
<label class="relative flex cursor-pointer rounded-xl border border-slate-200 dark:border-[#233648] bg-white dark:bg-[#111a22] p-4 shadow-sm hover:border-primary/50 focus-within:border-primary transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input checked="" class="sr-only" name="club-type" type="radio" value="tech"/>
<div class="flex flex-col gap-2 items-center text-center w-full">
<span class="material-symbols-outlined text-primary text-2xl">terminal</span>
<span class="text-sm font-bold text-slate-900 dark:text-white">Tech Club</span>
</div>
</label>
<label class="relative flex cursor-pointer rounded-xl border border-slate-200 dark:border-[#233648] bg-white dark:bg-[#111a22] p-4 shadow-sm hover:border-primary/50 focus-within:border-primary transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="sr-only" name="club-type" type="radio" value="non-tech"/>
<div class="flex flex-col gap-2 items-center text-center w-full">
<span class="material-symbols-outlined text-orange-500 text-2xl">palette</span>
<span class="text-sm font-bold text-slate-900 dark:text-white">Non-Tech Club</span>
</div>
</label>
</div>
</div>
<div class="pt-4">
<button class="w-full rounded-xl bg-primary py-4 text-center text-base font-bold text-white shadow-lg hover:bg-blue-600 focus:outline-none focus:ring-4 focus:ring-primary/20 transition-all active:scale-[0.98]" type="submit">
                        Complete Setup
                    </button>
</div>
</form>
</main>
</div>

</body></html>
