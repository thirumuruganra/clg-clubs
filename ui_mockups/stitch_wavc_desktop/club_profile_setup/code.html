<div class="flex flex-col gap-3">
<p class="text-[#111418] dark:text-white text-3xl md:text-4xl font-black leading-tight tracking-[-0.033em]">Set up your club profile</p>
<p class="text-[#637588] dark:text-[#92adc9] text-base font-normal leading-normal">Tell us a bit about your club to get started. This information will be visible to all students.</p>
</div>
<!-- Profile Header / Logo Upload -->
<div class="flex flex-col md:flex-row items-center md:items-start gap-6 p-6 rounded-2xl border border-[#e5e7eb] dark:border-[#233648] bg-white dark:bg-[#111a22]">
<div class="relative group cursor-pointer">
<div class="bg-center bg-no-repeat bg-cover rounded-full h-32 w-32 bg-[#f0f2f4] dark:bg-[#192633] border-2 border-dashed border-[#92adc9] flex items-center justify-center overflow-hidden" data-alt="Default placeholder for club logo upload showing a generic user or image icon">
<span class="material-symbols-outlined text-4xl text-[#92adc9]">add_a_photo</span>
</div>
<div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white">edit</span>
</div>
</div>
<div class="flex flex-col justify-center items-center md:items-start text-center md:text-left">
<p class="text-[#111418] dark:text-white text-[22px] font-bold leading-tight tracking-[-0.015em] mb-1">Upload Club Logo</p>
<p class="text-[#637588] dark:text-[#92adc9] text-sm font-normal leading-normal mb-3">Recommended size: 400x400px. JPG, PNG supported.</p>
<button class="flex items-center gap-2 text-primary font-bold text-sm hover:underline">
<span class="material-symbols-outlined text-lg">upload</span>
                        Select File
                    </button>
</div>
</div>
<!-- Input Fields -->
<div class="flex flex-col gap-6">
<!-- Club Name -->
<label class="flex flex-col gap-2">
<p class="text-[#111418] dark:text-white text-base font-medium leading-normal">Club Name</p>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#e5e7eb] dark:border-[#324d67] bg-[#f9fafb] dark:bg-[#192633] focus:border-primary h-14 placeholder:text-[#9ca3af] dark:placeholder:text-[#92adc9] p-[15px] text-base font-normal leading-normal transition-all" placeholder="e.g. WAVC Robotics Club" value=""/>
</label>
<!-- Instagram ID -->
<label class="flex flex-col gap-2">
<p class="text-[#111418] dark:text-white text-base font-medium leading-normal">Instagram Handle</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#9ca3af] dark:text-[#92adc9]">@</span>
<input class="form-input flex w-full resize-none overflow-hidden rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#e5e7eb] dark:border-[#324d67] bg-[#f9fafb] dark:bg-[#192633] focus:border-primary h-14 placeholder:text-[#9ca3af] dark:placeholder:text-[#92adc9] pl-9 p-[15px] text-base font-normal leading-normal transition-all" placeholder="wavc_robotics" value=""/>
</div>
</label>
</div>

<label class="group cursor-pointer flex items-start gap-4 rounded-xl border border-solid border-[#e5e7eb] dark:border-[#324d67] bg-white dark:bg-[#111a22] p-4 hover:border-primary dark:hover:border-primary transition-all shadow-sm">
<div class="mt-1">
<input checked="" class="h-5 w-5 border-2 border-[#9ca3af] dark:border-[#324d67] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="club-category" type="radio"/>

<div class="flex grow flex-col">
<p class="text-[#111418] dark:text-white text-base font-semibold leading-normal mb-1">Tech Club</p>
<p class="text-[#637588] dark:text-[#92adc9] text-sm font-normal leading-normal">Focuses on coding, engineering, data science, and hardware projects.</p>
</div>
</label>
<label class="group cursor-pointer flex items-start gap-4 rounded-xl border border-solid border-[#e5e7eb] dark:border-[#324d67] bg-white dark:bg-[#111a22] p-4 hover:border-primary dark:hover:border-primary transition-all shadow-sm">
<div class="mt-1">
<input class="h-5 w-5 border-2 border-[#9ca3af] dark:border-[#324d67] bg-transparent text-transparent checked:border-primary checked:bg-[image:--radio-dot-svg] focus:outline-none focus:ring-0 focus:ring-offset-0 checked:focus:border-primary" name="club-category" type="radio"/>
</div>
<div class="flex grow flex-col">
<p class="text-[#111418] dark:text-white text-base font-semibold leading-normal mb-1">Non-Tech Club</p>
<p class="text-[#637588] dark:text-[#92adc9] text-sm font-normal leading-normal">Focuses on arts, culture, sports, debate, social causes, or networking.</p>
</div>
</label>
</div>

<button class="w-full md:w-auto text-[#111418] dark:text-white text-base font-bold leading-normal px-6 py-3 hover:opacity-80 transition-opacity">

<span class="material-symbols-outlined text-sm font-bold">arrow_forward</span>
